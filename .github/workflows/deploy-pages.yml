name: Build Check (Jekyll)

# 注意：線上網站由 GitHub Pages 的 legacy build（Pages 設定為 branch main /docs）
# 實際供稿。本 workflow 僅用 Jekyll 4.3 驗證網站能成功 build，不做部署——
# 先前的 deploy job 會與 legacy build 搶 "pages" 部署而出現 "Deployment cancelled"
# 間歇性失敗，故移除。
#
# 若日後要改用 GitHub Actions 部署（Jekyll 4.3 + just-the-docs、clean URL），
# 需將 repo Pages 設定的 build_type 由 legacy 改為 workflow，並還原 deploy job；
# 但這會把既有 .html URL 改為 clean URL，影響既有索引，需一併處理 redirect。

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '_config.yml'
      - 'Gemfile'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll (validation only)
        run: bundle exec jekyll build --source docs --destination _site --config _config.yml
        env:
          JEKYLL_ENV: production
