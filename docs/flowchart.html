      tip:"使用者觸發「執行完整流程」" },
    { id:"checklist",   label:"建立任務檢查清單",     c:3, r:0.7,  clr:C.ctrl, sh:"rect",
      tip:"輸出：任務目標、預計 Layers、適用 Schema、YMYL 宣告\n此步驟為強制，不可跳過" },

    { id:"scan",        label:"掃描啟用的 Layers",    c:3, r:1.5,  clr:C.ctrl, sh:"rect",

    { id:"count",       label:"統計現有 JSONL 行數",  c:3, r:2.1,  clr:C.ctrl, sh:"rect",
      tip:"wc -l docs/Extractor/*/raw/*.jsonl\n作為後續去重的基準" },

    /* Phase 2 — Parallel Fetch (7 layers) */
    { id:"f_who",  label:"fetch WHO DON",       c:0, r:3.0, clr:C.fetch, sh:"rect",

    { id:"f_han",  label:"fetch CDC HAN",       c:1, r:3.0, clr:C.fetch, sh:"rect",
      tip:"bash core/Extractor/Layers/us_cdc_han/fetch.sh\n來源：CDC RSS\n產出：raw/rss-*.jsonl\n僅緊急事件時有內容" },
    { id:"f_mmwr", label:"fetch CDC MMWR",      c:2, r:3.0, clr:C.fetch, sh:"rect",
      tip:"bash core/Extractor/Layers/us_cdc_mmwr/fetch.sh\n來源：CDC RSS（週報）\n產出：raw/rss-*.jsonl" },
    { id:"f_trav", label:"fetch Travel Health",  c:3, r:3.0, clr:C.fetch, sh:"rect",

    { id:"f_uk",   label:"fetch UK UKHSA",      c:5, r:3.0, clr:C.fetch, sh:"rect",

    { id:"f_tw",   label:"fetch 台灣 CDC",      c:6, r:3.0, clr:C.fetch, sh:"rect",

    /* Phase 3 — Extraction */

    { id:"dup_chk",    label:"有新資料？",                 c:2, r:5.4, clr:C.ext, sh:"dia",

    { id:"skip",       label:"跳過",                       c:1, r:5.4, clr:C.ext, sh:"ell",

    /* Phase 4 — Qdrant Update (7 layers) */
    { id:"u_who",  label:"update WHO",    c:0, r:7.8, clr:C.qdr, sh:"rect",

    { id:"u_han",  label:"update HAN",    c:1, r:7.8, clr:C.qdr, sh:"rect",

    { id:"u_mmwr", label:"update MMWR",   c:2, r:7.8, clr:C.qdr, sh:"rect",
      tip:"update.sh：讀取 .md → OpenAI embedding → Qdrant upsert" },
    { id:"u_trav", label:"update Travel",  c:3, r:7.8, clr:C.qdr, sh:"rect",
      tip:"update.sh：讀取 .md → OpenAI embedding → Qdrant upsert" },
    { id:"u_ecdc", label:"update ECDC",   c:4, r:7.8, clr:C.qdr, sh:"rect",

    { id:"prev_rpt",   label:"載入上一期報告",               c:2, r:10.8, clr:C.rpt, sh:"rect",

    { id:"qg_fix",  label:"主執行緒修正問題",         c:5, r:20.1, clr:C.rev, sh:"rect",

    { id:"done",    label:"完成",                     c:3, r:21.0, clr:C.ctrl, sh:"ell",

  /* ========== edges ========== */

    { f:"start",    t:"checklist" },
    { f:"checklist",t:"scan" },

    { f:"ext_out", t:"u_trav", dsh:1 },

    { f:"commit", t:"push" },
    { f:"push",   t:"pages" },

    { f:"lychee", t:"fixable" },
    { f:"fixable",t:"autofix", lbl:"是" },
    { f:"fixable",t:"issue",   lbl:"否" },

    /* quality gate */
    { f:"pages",  t:"qg_task" },
    { f:"qg_task",t:"qg_run" },
    { f:"qg_run", t:"qg_ok" },
    { f:"qg_ok",  t:"qg_fix",  lbl:"FAIL" },
    { f:"qg_fix", t:"qg_task", lbl:"重新審核", back:1 },
    { f:"qg_ok",  t:"done",    lbl:"PASS" }
  ];

  /* ========== layout constants ========== */
  var COL_W = 155, ROW_H = 58;
  var PAD = { t:50, l:50, r:50, b:50 };
  var NW = 140, NH = 44;

  function cx(col) { return PAD.l + col * COL_W + COL_W / 2; }
  function cy(row) { return PAD.t + row * ROW_H + ROW_H / 2; }

  var maxCol = 0, maxRow = 0;
  nodes.forEach(function(n) {
    if (n.c > maxCol) maxCol = n.c;
    if (n.r > maxRow) maxRow = n.r;
  });

  var W = PAD.l + (maxCol + 1) * COL_W + PAD.r;
  var H = PAD.t + (maxRow + 1) * ROW_H + PAD.b + 20;

  /* ========== svg ========== */
  var svg = d3.select("#flowchart-svg")
    .attr("width", W)
    .attr("height", H)
    .attr("viewBox", "0 0 " + W + " " + H)
    .style("display", "block");

  var g = svg.append("g");
  var tip = d3.select("#tooltip");

  /* zoom */
  var zm = d3.zoom().scaleExtent([0.3, 3])
    .on("zoom", function(ev) { g.attr("transform", ev.transform); });
  svg.call(zm);

  d3.select("#btn-zin").on("click", function() { svg.transition().call(zm.scaleBy, 1.3); });
  d3.select("#btn-zout").on("click", function() { svg.transition().call(zm.scaleBy, 0.75); });
  d3.select("#btn-zreset").on("click", function() { svg.transition().call(zm.transform, d3.zoomIdentity); });

  /* arrowhead */
  svg.append("defs").append("marker")
    .attr("id", "arr").attr("viewBox", "0 0 10 10")
    .attr("refX", 9).attr("refY", 5)
    .attr("markerWidth", 7).attr("markerHeight", 7)
    .attr("orient", "auto-start-reverse")
    .append("path").attr("d", "M 0 0 L 10 5 L 0 10 z").attr("fill", "#586069");

  /* ========== phase backgrounds ========== */
  var pClrs = [
    "#eef2fa","#fdf5ed","#fdf5ed",
    "#edf7ef","#edf7ef","#edf7ef",
    "#f5eefa","#f5eefa",
    "#f5efe4","#f5efe4",
    "#efefef","#efefef","#efefef","#efefef",
    "#faeef4","#faeef4","#faeef4"
  ];

  phases.forEach(function(p, i) {
    var ny = (i < phases.length - 1) ? phases[i + 1].y : maxRow + 1;
    var y0 = PAD.t + p.y * ROW_H - 5;
    var h  = (ny - p.y) * ROW_H + 10;

    g.append("rect")
      .attr("x", 5).attr("y", y0)
      .attr("width", W - 10).attr("height", h)
      .attr("rx", 6).attr("ry", 6)
      .attr("fill", pClrs[i] || "#fafafa")
      .attr("stroke", "#d8dde3")
      .attr("stroke-dasharray", "4,2")
      .attr("opacity", 0.7);

    g.append("text")
      .attr("class", "phase-label")
      .attr("x", 14).attr("y", y0 + 16)
      .attr("font-size", 11)
      .text(p.label);
  });

  /* ========== node map ========== */
  var nMap = {};
  nodes.forEach(function(n) {
    n.x = cx(n.c);
    n.y = cy(n.r);
    nMap[n.id] = n;
  });

  /* ========== draw edges ========== */
  var pathGen = d3.line().curve(d3.curveBasis);

  edges.forEach(function(e) {
    var s = nMap[e.f], t = nMap[e.t];
    if (!s || !t) return;

    var pts;
    if (e.back) {
      var mx = Math.max(s.x, t.x) + 90;
      pts = [[s.x + NW/2, s.y], [mx, s.y], [mx, t.y], [t.x + NW/2, t.y]];
    } else {
      var dx = t.x - s.x, dy = t.y - s.y;
      var sx, sy, tx, ty;
      if (Math.abs(dy) > Math.abs(dx) * 0.4) {
        sy = s.y + (dy > 0 ? NH/2 : -NH/2);
        ty = t.y + (dy > 0 ? -NH/2 : NH/2);
        sx = s.x; tx = t.x;
      } else {
        sx = s.x + (dx > 0 ? NW/2 : -NW/2);
        tx = t.x + (dx > 0 ? -NW/2 : NW/2);
        sy = s.y; ty = t.y;
      }
      var my = (sy + ty) / 2;
      pts = [[sx, sy], [sx, my], [tx, my], [tx, ty]];
    }

    var path = g.append("path")
      .attr("d", pathGen(pts))
      .attr("stroke", "#586069")
      .attr("stroke-width", 1.5)
      .attr("fill", "none")
      .attr("marker-end", "url(#arr)");

    if (e.dsh) path.attr("stroke-dasharray", "5,3");

    if (e.lbl) {
      var mid = pts[Math.floor(pts.length / 2)];
      g.append("text")
        .attr("x", mid[0]).attr("y", mid[1] - 5)
        .attr("text-anchor", "middle")
        .attr("font-size", 9.5)
        .attr("fill", "#6a737d")
        .attr("font-family", "-apple-system, sans-serif")
        .text(e.lbl);
    }
  });

  /* ========== draw nodes ========== */
  nodes.forEach(function(n) {
    var ng = g.append("g")
      .attr("class", "node")
      .attr("transform", "translate(" + n.x + "," + n.y + ")");

    var w = NW, h = NH;
    var fill = lighten(n.clr, 0.15);
    var stroke = n.clr;
    var txtClr = darken(n.clr);

    if (n.sh === "ell") {
      ng.append("ellipse")
        .attr("rx", w/2).attr("ry", h/2)
        .attr("fill", fill).attr("stroke", stroke);
    } else if (n.sh === "dia") {
      ng.append("polygon")
        .attr("points", "0," + (-h/2) + " " + (w/2) + ",0 0," + (h/2) + " " + (-w/2) + ",0")
        .attr("fill", fill).attr("stroke", stroke);
    } else if (n.sh === "para") {
      var s = 12;
      ng.append("polygon")
        .attr("points",
          (-w/2+s)+","+(-h/2)+" "+(w/2)+","+(-h/2)+" "+(w/2-s)+","+(h/2)+" "+(-w/2)+","+(h/2))
        .attr("fill", fill).attr("stroke", stroke);
    } else if (n.sh === "hex") {
      var hx = 14;
      ng.append("polygon")
        .attr("points",
          (-w/2+hx)+","+(-h/2)+" "+(w/2-hx)+","+(-h/2)+" "+(w/2)+",0 "+
          (w/2-hx)+","+(h/2)+" "+(-w/2+hx)+","+(h/2)+" "+(-w/2)+",0")
        .attr("fill", fill).attr("stroke", stroke);
    } else {
      ng.append("rect")
        .attr("x", -w/2).attr("y", -h/2)
        .attr("width", w).attr("height", h)
        .attr("rx", 6).attr("ry", 6)
        .attr("fill", fill).attr("stroke", stroke);
    }

    /* text */
    var lines = n.label.split("\n");
    var fs = lines.some(function(l) { return l.length > 16; }) ? 9.5 : 10.5;
    lines.forEach(function(ln, i) {
      ng.append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("y", (i - (lines.length-1)/2) * (fs + 3))
        .attr("font-size", fs)
        .attr("fill", txtClr)
        .attr("font-weight", 600)
        .text(ln);
    });

    /* tooltip */
    if (n.tip) {
      ng.on("mouseover", function(ev) {
        var html = n.tip
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/\n/g, "<br>");
        tip.style("opacity", 1).html(html)
          .style("left", (ev.clientX + 14) + "px")
          .style("top",  (ev.clientY - 10) + "px");
      })
      .on("mousemove", function(ev) {
        tip.style("left", (ev.clientX + 14) + "px")
           .style("top",  (ev.clientY - 10) + "px");
      })
      .on("mouseout", function() {
        tip.style("opacity", 0);
      });
    }
  });

})();
</script>
