    { from:'extract_out',  to:'update_tw',     label:'',           dash:true },

    // Update → Qdrant
    { from:'update_who',    to:'qdrant_db', label:'' },
    { from:'update_han',    to:'qdrant_db', label:'' },
    { from:'update_mmwr',   to:'qdrant_db', label:'' },
    { from:'update_travel', to:'qdrant_db', label:'' },
    { from:'update_ecdc',   to:'qdrant_db', label:'' },
    { from:'update_ukhsa',  to:'qdrant_db', label:'' },
    { from:'update_tw',     to:'qdrant_db', label:'' },

    // Update → OpenAI
    { from:'update_who',    to:'openai_embed', label:'embed', dash:true },
    { from:'openai_embed',  to:'qdrant_db',    label:'vector' },

    // Report
    { from:'qdrant_db',     to:'read_extracts', label:'' },
    { from:'read_extracts', to:'identify',      label:'' },
    { from:'identify',      to:'semantic',      label:'' },
    { from:'semantic',      to:'qdrant_db',     label:'查詢', dash:true, back:true },
    { from:'identify',      to:'prev_report',   label:'' },
    { from:'prev_report',   to:'synthesize',    label:'' },
    { from:'semantic',      to:'synthesize',    label:'' },
    { from:'synthesize',    to:'report_out',    label:'' },

    // SEO
    { from:'report_out',    to:'seo_writer',   label:'' },
    { from:'seo_writer',    to:'seo_reviewer', label:'' },
    { from:'seo_reviewer',  to:'seo_pass',     label:'' },
    { from:'seo_pass',      to:'seo_writer',   label:'fail — 修正', back:true },
    { from:'seo_pass',      to:'update_ts',    label:'pass' },

    // Deploy
    { from:'update_ts',     to:'git_commit',   label:'' },
    { from:'git_commit',    to:'git_push',     label:'' },
    { from:'git_push',      to:'pages_deploy', label:'' },
    { from:'git_push',      to:'link_check',   label:'' },
    { from:'link_check',    to:'link_fix',     label:'' },
    { from:'link_fix',      to:'auto_fix',     label:'是' },
    { from:'link_fix',      to:'open_issue',   label:'否' },

    // Quality Gate
    { from:'pages_deploy',  to:'qg_task',      label:'' },
    { from:'qg_task',       to:'qg_run',       label:'' },
    { from:'qg_run',        to:'qg_pass',      label:'' },
    { from:'qg_pass',       to:'qg_fix',       label:'FAIL' },
    { from:'qg_fix',        to:'qg_task',      label:'重新審核', back:true },
    { from:'qg_pass',       to:'done',         label:'PASS' },
  ];

  // ============================================================
  // LAYOUT: compute positions
  // ============================================================
  const COL_W = 155, ROW_H = 58;
  const MARGIN = { top: 50, left: 50, right: 50, bottom: 50 };
  const NODE_W = 140, NODE_H = 44;

  function cx(col) { return MARGIN.left + col * COL_W + COL_W / 2; }
  function cy(row) { return MARGIN.top + row * ROW_H + ROW_H / 2; }

  const maxCol = Math.max(...nodes.map(n => n.col));
  const maxRow = Math.max(...nodes.map(n => n.row));
  const svgW = MARGIN.left + (maxCol + 1) * COL_W + MARGIN.right;
  const svgH = MARGIN.top + (maxRow + 1) * ROW_H + MARGIN.bottom + 20;

  const svg = d3.select('#flowchart-svg')
    .attr('viewBox', `0 0 ${svgW} ${svgH}`)
    .attr('width', svgW)
    .attr('height', svgH);

  const g = svg.append('g');
  const tooltip = d3.select('#tooltip');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.3, 3])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  window.zoomIn = () => svg.transition().call(zoom.scaleBy, 1.3);
  window.zoomOut = () => svg.transition().call(zoom.scaleBy, 0.75);
  window.zoomReset = () => svg.transition().call(zoom.transform, d3.zoomIdentity);

  // Arrowhead marker
  svg.append('defs').append('marker')
    .attr('id','arrow').attr('viewBox','0 0 10 10')
    .attr('refX',9).attr('refY',5)
    .attr('markerWidth',7).attr('markerHeight',7)
    .attr('orient','auto-start-reverse')
    .append('path').attr('d','M 0 0 L 10 5 L 0 10 z').attr('fill','#586069');

  // ============================================================
  // DRAW: Phase backgrounds
  // ============================================================
  const phaseColors = ['#f0f4ff','#fff8f0','#fff8f0','#f0fff4','#f0fff4','#f0fff4',
                       '#faf0ff','#faf0ff','#f7f0e8','#f7f0e8','#f0f0f0','#f0f0f0',
                       '#f0f0f0','#f0f0f0','#fff0f6','#fff0f6','#fff0f6'];

  phases.forEach((p, i) => {
    const nextY = (i < phases.length - 1) ? phases[i + 1].y : maxRow + 1;
    const y0 = MARGIN.top + p.y * ROW_H - 5;
    const h = (nextY - p.y) * ROW_H + 10;

    g.append('rect')
      .attr('class','phase-bg')
      .attr('x', 5).attr('y', y0)
      .attr('width', svgW - 10).attr('height', h)
      .attr('fill', phaseColors[i] || '#fafafa')
      .attr('stroke', '#e1e4e8')
      .attr('stroke-dasharray', '4,2')
      .attr('opacity', 0.6);

    g.append('text')
      .attr('class','phase-label')
      .attr('x', 14).attr('y', y0 + 16)
      .attr('font-size', 11)
      .text(p.label);
  });

  // ============================================================
  // DRAW: Edges
  // ============================================================
  const nodeMap = {};
  nodes.forEach(n => {
    n.x = cx(n.col);
    n.y = cy(n.row);
    nodeMap[n.id] = n;
  });

  const line = d3.line().curve(d3.curveBasis);

  edges.forEach(e => {
    const src = nodeMap[e.from], tgt = nodeMap[e.to];
    if (!src || !tgt) return;

    let points;
    if (e.back) {
      // feedback loop — curve around
      const mx = Math.max(src.x, tgt.x) + 80;
      const my = (src.y + tgt.y) / 2;
      points = [[src.x + NODE_W/2, src.y], [mx, src.y], [mx, tgt.y], [tgt.x + NODE_W/2, tgt.y]];
    } else {
      const dx = tgt.x - src.x, dy = tgt.y - src.y;
      let sx, sy, tx, ty;
      if (Math.abs(dy) > Math.abs(dx) * 0.4) {
        // mostly vertical
        sy = src.y + (dy > 0 ? NODE_H/2 : -NODE_H/2);
        ty = tgt.y + (dy > 0 ? -NODE_H/2 : NODE_H/2);
        sx = src.x; tx = tgt.x;
      } else {
        // mostly horizontal
        sx = src.x + (dx > 0 ? NODE_W/2 : -NODE_W/2);
        tx = tgt.x + (dx > 0 ? -NODE_W/2 : NODE_W/2);
        sy = src.y; ty = tgt.y;
      }
      const my = (sy + ty) / 2;
      points = [[sx, sy], [sx, my], [tx, my], [tx, ty]];
    }

    const path = g.append('path')
      .attr('d', line(points))
      .attr('stroke', '#586069')
      .attr('stroke-width', 1.5)
      .attr('fill', 'none')
      .attr('marker-end', 'url(#arrow)');

    if (e.dash) path.attr('stroke-dasharray', '5,3');

    if (e.label) {
      const mid = points[Math.floor(points.length / 2)];
      g.append('text')
        .attr('x', mid[0]).attr('y', mid[1] - 5)
        .attr('text-anchor', 'middle')
        .attr('font-size', 9.5)
        .attr('fill', '#6a737d')
        .attr('font-family', '-apple-system, sans-serif')
        .text(e.label);
    }
  });

  // ============================================================
  // DRAW: Nodes
  // ============================================================
  nodes.forEach(n => {
    const ng = g.append('g')
      .attr('class','node')
      .attr('transform', `translate(${n.x}, ${n.y})`);

    const w = NODE_W, h = NODE_H;
    const lightFill = d3.color(n.color).copy({opacity:0.12}).formatRgb();
    const textColor = d3.color(n.color).darker(0.5).formatHex();

    switch (n.shape) {
      case 'ellipse':
        ng.append('ellipse')
          .attr('rx', w/2).attr('ry', h/2)
          .attr('fill', lightFill).attr('stroke', n.color);
        break;
      case 'diamond':
        ng.append('polygon')
          .attr('points', `0,${-h/2} ${w/2},0 0,${h/2} ${-w/2},0`)
          .attr('fill', lightFill).attr('stroke', n.color);
        break;
      case 'parallelogram':
        const s = 12;
        ng.append('polygon')
          .attr('points', `${-w/2+s},${-h/2} ${w/2},${-h/2} ${w/2-s},${h/2} ${-w/2},${h/2}`)
          .attr('fill', lightFill).attr('stroke', n.color);
        break;
      case 'hexagon':
        const hx = 14;
        ng.append('polygon')
          .attr('points', `${-w/2+hx},${-h/2} ${w/2-hx},${-h/2} ${w/2},0 ${w/2-hx},${h/2} ${-w/2+hx},${h/2} ${-w/2},0`)
          .attr('fill', lightFill).attr('stroke', n.color);
        break;
      default: // rect
        ng.append('rect')
          .attr('x', -w/2).attr('y', -h/2)
          .attr('width', w).attr('height', h)
          .attr('rx', 6).attr('ry', 6)
          .attr('fill', lightFill).attr('stroke', n.color);
    }

    // Text (handle multiline with \n)
    const lines = n.label.split('\n');
    const fontSize = lines.some(l => l.length > 16) ? 9.5 : 10.5;
    lines.forEach((ln, i) => {
      ng.append('text')
        .attr('text-anchor','middle')
        .attr('dominant-baseline','central')
        .attr('y', (i - (lines.length-1)/2) * (fontSize + 3))
        .attr('font-size', fontSize)
        .attr('fill', textColor)
        .attr('font-weight', 600)
        .text(ln);
    });

    // Tooltip interaction
    ng.on('mouseover', (event) => {
      if (!n.tip) return;
      tooltip.style('opacity', 1)
        .html(n.tip.replace(/\n/g,'<br>').replace(/([A-Z_]+:)/g,'<strong>$1</strong>'))
        .style('left', (event.pageX + 14) + 'px')
        .style('top', (event.pageY - 10) + 'px');
    })
    .on('mousemove', (event) => {
      tooltip.style('left', (event.pageX + 14) + 'px')
             .style('top', (event.pageY - 10) + 'px');
    })
    .on('mouseout', () => tooltip.style('opacity', 0));
  });

})();
</script>
